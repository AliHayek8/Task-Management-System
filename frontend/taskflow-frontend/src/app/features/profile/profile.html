
<div class="profile-container">
  <h1 class="title">Profile Settings</h1>

  <div class="card">

    <div class="header">
      <div class="avatar">{{ user.name[0] }}</div>

      <div class="user-info">
        <h3>{{ user.name }}</h3>
      </div>
    </div>

    <app-dynamic-form
      [form]="form"
      [fields]="fields"
      (submit)="saveGeneral()"
      (cancel)="cancelEdit()">

      <div class="form-group">
        <label>Email</label>
        <p class="email-text">{{ user.email }}</p>
      </div>

    </app-dynamic-form>
  </div>
</div>
