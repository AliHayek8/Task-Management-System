<div class="profile-container">
  <h1 class="title">Profile Settings</h1>

  <div class="card">
    <div class="header">
      <div class="avatar">{{ user.name[0] }}</div>
      <div class="user-info">
        <h3>{{ user.name }}</h3>
        <p>{{ user.email }}</p>
      </div>
    </div>

    <form>
      <div class="form-group">
        <label for="name">Full Name</label>
        <input id="name" [(ngModel)]="editedName" name="name" type="text" />
      </div>

      <div class="form-group">
        <label>Email</label>
        <p class="email-text">{{ user.email }}</p>
      </div>

      <div class="actions">
        <button type="button" class="save-btn" (click)="saveGeneral()">Save Changes</button>
        <button type="button" class="cancel-btn" (click)="cancelEdit()">Cancel</button>
      </div>
    </form>
  </div>
</div>
