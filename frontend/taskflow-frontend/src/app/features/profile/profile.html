<div class="profile-container">
  <h1 class="title">Profile Settings</h1>

  <div class="card">
    <div class="header">
      <div class="avatar">{{ user.name[0] }}</div>
      <div class="user-info">
        <h3>{{ user.name }}</h3>
        <p>{{ user.email }}</p>
      </div>
    </div>

   

    <div *ngIf="selectedTab() === 'general'">
      <div class="form-group">
        <label>Full Name</label>
        <input [(ngModel)]="editableUser.name" type="text" />
      </div>

      <div class="form-group">
        <label>Email</label>
        <input [(ngModel)]="editableUser.email" type="email" readonly />
      </div>

      <div class="actions">
        <button class="save-btn" (click)="saveGeneral()">Save Changes</button>
        <button class="cancel-btn" (click)="cancelEdit()">Cancel</button>
      </div>
    </div>
  </div>
</div>
