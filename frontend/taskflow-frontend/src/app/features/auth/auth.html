<div class="auth-container">

  <div class="auth-card" *ngIf="isLoginMode">
    <h2>Welcome back</h2>
    <p>Sign in to your account</p>

    <div class="error-message" *ngIf="errorMessage">{{ errorMessage }}</div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="loginData.email" placeholder="Enter your email"/>
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password"
             [(ngModel)]="loginData.password"
             placeholder="Enter your password"
             (keyup.enter)="onLogin()"/>
    </div>

    <button class="btn-primary" type="button" (click)="onLogin()">Sign in</button>

    <p class="toggle-text">
      Don't have an account? <span (click)="toggleMode()">Sign up</span>
    </p>
  </div>

  <div class="auth-card" *ngIf="!isLoginMode">
    <h2>Create account</h2>
    <p>Register to get started</p>

    <div class="error-message" *ngIf="errorMessage">{{ errorMessage }}</div>

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" [(ngModel)]="registerData.name" placeholder="Enter your name"/>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="registerData.email" placeholder="Enter your email"/>
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password"
             [(ngModel)]="registerData.password"
             placeholder="Enter your password"
             (keyup.enter)="onRegister()"/>
    </div>

    <button class="btn-primary" (click)="onRegister()">Sign up</button>

    <p class="toggle-text">
      Already have an account? <span (click)="toggleMode()">Sign in</span>
    </p>
  </div>

</div>
