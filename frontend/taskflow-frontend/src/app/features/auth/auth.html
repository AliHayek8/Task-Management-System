<div class="auth-container">

  <div class="auth-logo">
    <div class="logo-icon">✦</div>
    <span class="logo-text">TaskFlow</span>
  </div>

  @if (isLoginMode) {
  <div class="auth-card">
    <h2>Welcome back</h2>
    <p>Sign in to your account</p>

    @if (errorMessage) {
    <div class="error-message">{{ errorMessage }}</div>
    }

    <app-dynamic-form
      [form]="loginForm"
      [fields]="loginFields"
      submitLabel="Sign in"
      [showCancel]="false"
      (submit)="onLogin()"
    />

    <p class="toggle-text">
      Don't have an account? <span (click)="toggleMode()">Sign up</span>
    </p>
  </div>
  }

  @if (!isLoginMode) {
  <div class="auth-card">
    <h2>Create account</h2>
    <p>Register to get started</p>

    @if (errorMessage) {
    <div class="error-message">{{ errorMessage }}</div>
    }

    <app-dynamic-form
      [form]="registerForm"
      [fields]="registerFields"
      submitLabel="Sign up"
      [showCancel]="false"
      (submit)="onRegister()"
    />

    <p class="toggle-text">
      Already have an account? <span (click)="toggleMode()">Sign in</span>
    </p>
  </div>
  }

</div>
