<div class="projects-page">

  <div class="header">
    <h2>Projects</h2>
    <button kendoButton class="btn-add-project" (click)="openNewProjectForm()">+ New Project</button>
  </div>

  <div class="projects-grid">
    <div class="project-card" *ngFor="let project of projects()">
      <h3>{{ project.name }}</h3>
      <p>{{ project.description }}</p>
      <p>{{ project.tasksCompleted }} / {{ project.totalTasks }} tasks completed</p>

      <div class="card-actions">
        <button kendoButton class="btn-edit" (click)="editProject(project)">✏️ Edit</button>
        <button kendoButton class="btn-delete" (click)="deleteProject(project)">🗑️ Delete</button>
      </div>
    </div>
  </div>

  <ng-container *ngIf="editingProject() as currentProject">
    <app-project-form
      [project]="currentProject"
      [isNewProject]="newProjectMode()"
      [closeForm]="saveProject.bind(this)">
    </app-project-form>
  </ng-container>

</div>
