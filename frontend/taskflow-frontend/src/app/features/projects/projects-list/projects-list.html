<div class="projects-page">
  <div class="header">
    <h2>Projects</h2>
    <button kendoButton class="btn-add-project" (click)="openAddProject()">+ New Project</button>
  </div>

  <div class="projects-grid">
    <div class="project-card" *ngFor="let p of projects()">
      <h3>{{ p.name }}</h3>
      <p>{{ p.description }}</p>
      <p>{{ p.tasksCompleted }} / {{ p.totalTasks }} tasks completed</p>

      <div class="card-actions">
        <button kendoButton class="btn-edit" (click)="openEditProject(p)">✏️ Edit</button>
<button class="btn-delete" (click)="p.id && deleteProject(p.id)">🗑️ Delete</button>      </div>
    </div>
  </div>

  <ng-container *ngIf="showPopup()">
    <app-project-form
      [project]="project()"
      [isNewProject]="!project().id"
      [save]="saveProject.bind(this)"
      [cancel]="cancel.bind(this)">
    </app-project-form>
  </ng-container>
</div>
