<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<div class="projects-page">
  <div class="header">
    <div>
      <h2>Projects</h2>
      <span class="subtitle">Manage and track your work</span>
    </div>

    <button class="btn-add-project" (click)="openAddProject()">
      + New Project
    </button>
  </div>

  <div class="projects-grid">
    @for (projectItem of projects(); track projectItem) {
    <div class="project-card">
      <div class="card-actions">
        <button class="btn-icon tasks" [routerLink]="['/projects', projectItem.id, 'tasks']">
          <i class="fa-solid fa-list-check"></i>
        </button>
        <button class="btn-icon edit" (click)="openEditProject(projectItem)">
          <i class="fa-solid fa-pen"></i>
        </button>
        <button class="btn-icon delete" (click)="projectItem.id && deleteProject(projectItem.id)">
          <i class="fa-solid fa-trash"></i>
        </button>
      </div>
      <div class="card-content">
        <h3>{{ projectItem.name }}</h3>
        <p class="description">{{ projectItem.description }}</p>
      </div>
      <div class="card-footer">
          <span class="tasks-badge">
            {{ projectItem.tasksCompleted || 0 }} / {{ projectItem.totalTasks || 0 }} tasks
          </span>
      </div>
    </div>
    }
  </div>

  @if (showPopup()) {
  <app-project-form
    [project]="currentProject()"
    [isNewProject]="!currentProject().id"
    [save]="saveProject.bind(this)"
    [cancel]="cancel.bind(this)">
  </app-project-form>
  }
</div>
