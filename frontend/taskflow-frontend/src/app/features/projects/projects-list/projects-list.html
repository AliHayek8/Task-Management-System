<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<div class="projects-page">
  <div class="header">
    <div>
      <h2>Projects</h2>
      <span class="subtitle">Manage and track your work</span>
    </div>

    <button class="btn-add-project" (click)="openAddProject()">
      + New Project
    </button>
  </div>

  <div class="projects-grid">
    <div class="project-card" *ngFor="let p of projects()">

      <div class="card-actions">
        <button class="btn-icon tasks" [routerLink]="['/projects', p.id, 'tasks']">
          <i class="fa-solid fa-list-check"></i>
        </button>
        <button class="btn-icon edit" (click)="openEditProject(p)">
          <i class="fa-solid fa-pen"></i>
        </button>
        <button class="btn-icon delete" (click)="p.id && deleteProject(p.id)">
          <i class="fa-solid fa-trash"></i>
        </button>
      </div>

      <div class="card-content">
        <h3>{{ p.name }}</h3>
        <p class="description">{{ p.description }}</p>
      </div>

      <div class="card-footer">
  <span class="tasks-badge">
    {{ p.tasksCompleted || 0 }} / {{ p.totalTasks || 0 }} tasks
  </span>
      </div>

    </div>
  </div>

  <ng-container *ngIf="showPopup()">
    <app-project-form
      [project]="project()"
      [isNewProject]="!project().id"
      [save]="saveProject.bind(this)"
      [cancel]="cancel.bind(this)">
    </app-project-form>
  </ng-container>
</div>
