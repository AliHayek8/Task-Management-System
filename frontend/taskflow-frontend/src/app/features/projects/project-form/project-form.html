<div class="form-popup">
  <div class="popup-content">


    <h3>
      {{ isNewProject() ? 'New Project' : 'Edit Project' }}
    </h3>


    <app-dynamic-form
      [form]="form"
      [fields]="fields"
      (submit)="onSave()"
      (cancel)="onCancel()">
    </app-dynamic-form>


  </div>
</div>
