<form #form="ngForm" (ngSubmit)="onSave(form)">
  <div class="form-popup">
    <div class="popup-content">
      <h3>{{ project().id ? 'Edit Project' : 'New Project' }}</h3>


      <div class="form-group">
        <label class="form-label">
          Name
          <span *ngIf="nameRef.invalid && nameRef.touched" class="required-star">*</span>
        </label>
        <input
          name="name"
          [(ngModel)]="project().name"
          required
          minlength="3"
          #nameRef="ngModel"
        />
        <div class="error" *ngIf="nameRef.invalid && nameRef.touched">
          <small *ngIf="nameRef.errors?.['required']">Name is required</small>
          <small *ngIf="nameRef.errors?.['minlength']">Minimum 3 characters</small>
        </div>
      </div>


      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea
          name="description"
          [(ngModel)]="project().description"
          #descRef="ngModel"
          (ngModelChange)="checkDescription($event)"
        ></textarea>
        <div class="error" *ngIf="descRef.touched && descriptionError">
          <small>Description must be at least 30 characters</small>
        </div>
      </div>


      <div class="popup-actions">
        <button kendoButton type="button" (click)="onCancel()" class="btn-cancel">
          Cancel
        </button>

        <button kendoButton class="btn-save" type="submit" [disabled]="form.invalid || descriptionError">
          Save
        </button>
      </div>
    </div>
  </div>
</form>
