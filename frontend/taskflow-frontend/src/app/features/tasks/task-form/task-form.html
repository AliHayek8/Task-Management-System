<div class="dialog-overlay">
  <div class="dialog-card">

    <!-- Dialog Header -->
    <div class="dialog-header">
      <h3>{{ isEditMode ? 'Edit Task' : 'New Task' }}</h3>
      <button kendoButton fillMode="flat" (click)="closeDialog()">✕</button>
    </div>

    <!-- Top-level Error Message -->
    <div class="error-message" *ngIf="errorMessage">{{ errorMessage }}</div>

    <!-- Title -->
    <div class="form-group">
      <label><span class="required-star">*</span> Title</label>
      <input type="text"
             [(ngModel)]="taskForm.title"
             placeholder="Task title (min 3 characters)"
             (input)="validateTitle()"
             (blur)="validateTitle()"
             [class.input-error]="fieldErrors.title" />
      <span class="field-error" *ngIf="fieldErrors.title">{{ fieldErrors.title }}</span>
    </div>

    <!-- Description -->
    <div class="form-group">
      <label>Description <span class="hint">(min 30 characters if provided)</span></label>
      <textarea [(ngModel)]="taskForm.description"
                placeholder="Details..."
                (input)="validateDescription()"
                (blur)="validateDescription()"
                [class.input-error]="fieldErrors.description"></textarea>
      <span class="field-error" *ngIf="fieldErrors.description">{{ fieldErrors.description }}</span>
    </div>

    <!-- Status & Priority -->
    <div class="form-row">
      <div class="form-group">
        <label>Status</label>
        <select [(ngModel)]="taskForm.status">
          <option value="TODO">To Do</option>
          <option value="IN_PROGRESS">In Progress</option>
          <option value="DONE">Done</option>
        </select>
      </div>
      <div class="form-group">
        <label>Priority</label>
        <select [(ngModel)]="taskForm.priority">
          <option value="LOW">Low</option>
          <option value="MEDIUM">Medium</option>
          <option value="HIGH">High</option>
        </select>
      </div>
    </div>

    <!-- Assignee Email -->
    <div class="form-group">
      <label>
        <span class="required-star" *ngIf="taskForm.status !== 'TODO'">*</span>
        Assignee Email
        <span class="hint" *ngIf="taskForm.status === 'TODO'">(optional for To Do)</span>
      </label>
      <input type="email"
             [(ngModel)]="taskForm.assigneeEmail"
             placeholder="email@example.com"
             (input)="validateAssigneeEmail()"
             (blur)="validateAssigneeEmail()"
             [class.input-error]="fieldErrors.assigneeEmail" />
      <span class="field-error" *ngIf="fieldErrors.assigneeEmail">{{ fieldErrors.assigneeEmail }}</span>
    </div>

    <!-- Deadline -->
    <div class="form-group">
      <label>Deadline</label>
      <input type="date"
             [(ngModel)]="taskForm.deadline"
             (change)="validateDeadline()"
             [class.input-error]="fieldErrors.deadline" />
      <span class="field-error" *ngIf="fieldErrors.deadline">{{ fieldErrors.deadline }}</span>
    </div>

    <!-- Actions -->
    <div class="dialog-actions">
      <button kendoButton themeColor="base" (click)="closeDialog()">Cancel</button>
      <button class="btn-create-task" (click)="saveTask()">
        {{ isEditMode ? 'Save Changes' : 'Create Task' }}
      </button>
    </div>

  </div>
</div>
