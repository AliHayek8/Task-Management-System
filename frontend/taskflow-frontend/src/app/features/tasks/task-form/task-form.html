<div class="dialog-overlay">
  <div class="dialog-card">

    <div class="dialog-header">
      <h3>{{ isEditMode ? 'Edit Task' : 'New Task' }}</h3>
      <button kendoButton fillMode="flat" (click)="closeDialog()">✕</button>
    </div>

    @if (errorMessage) {
    <div class="error-message">{{ errorMessage }}</div>
    }

    <app-dynamic-form
      [form]="taskFormGroup"
      [fields]="taskFields"
      [submitLabel]="isEditMode ? 'Save Changes' : 'Create Task'"
      (submit)="saveTask()"
      (cancel)="closeDialog()"
    />

  </div>
</div>
